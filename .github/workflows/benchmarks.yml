name: Benchmarks

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  benchmark:
    name: Benchmarks / macOS ARM64
    runs-on: macos-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-macos-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-macos-

      - name: Cache fastembed model
        uses: actions/cache@v4
        with:
          path: ~/.cache/fastembed
          key: fastembed-bge-small-en-v1.5
          restore-keys: |
            fastembed-

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run benchmarks
        run: uv run pytest tests/benchmarks/ -v -m benchmark
